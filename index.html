<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De-zato Menu | Freshly Made with Love</title>
    <style>
        body {
            margin: 0;
            padding: 20px 10px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            /* Pure black to blend with the menu's dark background */
            color: #fff;
            text-align: center;
            -webkit-font-smoothing: antialiased;
        }

        /* Container to hold the images */
        .menu-container {
            max-width: 900px;
            /* Increased width to better match PDF proportions */
            margin: 0 auto;
        }

        img {
            width: 100%;
            /* Full width of the container */
            height: auto;
            /* Maintain aspect ratio to prevent stretching */
            margin-bottom: 30px;
            /* Clean separation between pages */
            border-radius: 12px;
            display: block;

            /* SHARPNESS SETTINGS */
            image-rendering: -webkit-optimize-contrast;
            /* For Chrome/Safari sharpness */
            image-rendering: crisp-edges;
            /* For Firefox sharpness */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            /* Professional depth */
        }

        .footer {
            margin-top: 50px;
            padding: 30px 20px;
            background: #111;
            border-radius: 20px;
        }

        .order-btn {
            display: inline-block;
            background: #fff;
            color: #000;
            padding: 18px 35px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            margin: 20px 0;
            transition: transform 0.2s;
        }

        .order-btn:active {
            transform: scale(0.95);
        }

        .note {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

    <div class="menu-container">
        <img src="De-zato menu_1.jpg" alt="De-zato Biscuits, Brownies, and Cakes Menu">
        <img src="De-zato menu_2.jpg" alt="De-zato Specials, Shakes, and Shakes Menu">
        <img src="De-zato menu_3.jpg" alt="De-zato Celebration Cakes Menu">
    </div>

</body>

</html>
